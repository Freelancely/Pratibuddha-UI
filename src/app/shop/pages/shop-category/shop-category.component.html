<!-- breadcrumb area start -->
<app-breadcrumb-one title="Shop Categories" subtitle="Shop Categories"></app-breadcrumb-one>
<!-- breadcrumb area end -->

<section class="tp-category-area pb-120">
  <div class="container">
    <!-- Loading State -->
    <div *ngIf="isLoading" class="row">
      <div class="col-12">
        <p class="text-center py-5">Loading categories...</p>
      </div>
    </div>

    <!-- Error State -->
    <div *ngIf="hasError && !isLoading" class="row">
      <div class="col-12">
        <p class="text-center py-5 text-danger">Unable to load categories. Please try again.</p>
      </div>
    </div>

    <!-- Categories Grid -->
    <div *ngIf="!isLoading && !hasError && category_data.length > 0" class="row">
      <div *ngFor="let item of category_data; trackBy: trackByCategory" class="col-lg-3 col-sm-6">
        <div class="tp-category-main-box mb-25 p-relative fix" style="background-color: #f3f5f7">
          <div class="tp-category-main-content">
            <h3 class="tp-category-main-title pb-1">
              <a (click)="handleCategory(item.categoryName)" class="cursor-pointer">{{ item.categoryName }}</a>
            </h3>
            <span class="tp-category-main-item">{{ item.productCount || 0 }} Products</span>
          </div>
        </div>
      </div>
    </div>

    <!-- Empty State -->
    <div *ngIf="!isLoading && !hasError && category_data.length === 0" class="row">
      <div class="col-12">
        <p class="text-center py-5">No categories available.</p>
      </div>
    </div>
  </div>
</section>

<!-- footer start -->
<app-site-footer></app-site-footer>
<!-- footer end -->
