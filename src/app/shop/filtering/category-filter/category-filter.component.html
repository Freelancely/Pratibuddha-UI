<div class="tp-shop-widget-content">
  <div class="tp-shop-widget-categories">
    <!-- Loading State -->
    <div *ngIf="isLoading" class="mb-3">
      <p class="text-muted">Loading categories...</p>
    </div>

    <!-- Error State -->
    <div *ngIf="hasError && !isLoading" class="mb-3">
      <p class="text-danger small">Unable to load categories.</p>
    </div>

    <!-- Categories List -->
    <ul *ngIf="!isLoading && !hasError && categoryData.length > 0">
      <li *ngFor="let category of categoryData; trackBy: trackByCategory">
        <a
          (click)="handleCategoryRoute(category.categoryName)"
          [ngClass]="{
            'cursor-pointer': true,
            active:
              activeQuery ===
              category.categoryName
                .toLowerCase()
                .replace('&', '')
                .split(' ')
                .join('-')
          }"
        >
          {{ category.categoryName }}
          <span>{{ category.productCount || 0 }}</span>
        </a>
      </li>
    </ul>

    <!-- Empty State -->
    <div *ngIf="!isLoading && !hasError && categoryData.length === 0" class="mb-3">
      <p class="text-muted">No categories available.</p>
    </div>
  </div>
</div>
