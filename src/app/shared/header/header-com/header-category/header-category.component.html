<div class="tp-header-category tp-category-menu tp-header-category-toggle">
  <button (click)="handleActive()" class="tp-category-menu-btn tp-category-menu-toggle">
    <span>
      <span>
        <svg width="18" height="14" viewBox="0 0 18 14" fill="none" xmlns="http://www.w3.org/2000/svg">
           <path fill-rule="evenodd" clip-rule="evenodd" d="M0 1C0 0.447715 0.447715 0 1 0H15C15.5523 0 16 0.447715 16 1C16 1.55228 15.5523 2 15 2H1C0.447715 2 0 1.55228 0 1ZM0 7C0 6.44772 0.447715 6 1 6H17C17.5523 6 18 6.44772 18 7C18 7.55228 17.5523 8 17 8H1C0.447715 8 0 7.55228 0 7ZM1 12C0.447715 12 0 12.4477 0 13C0 13.5523 0.447715 14 1 14H11C11.5523 14 12 13.5523 12 13C12 12.4477 11.5523 12 11 12H1Z" fill="currentColor"/>
        </svg>
     </span>
    </span>
    All Categories
  </button>
  <nav *ngIf="isActive" class="tp-category-menu-content">
    <!-- Loading State -->
    <div *ngIf="isLoadingCategories" class="tp-category-loading">
      <p>Loading categories...</p>
    </div>

    <!-- Error State -->
    <div *ngIf="hasError && !isLoadingCategories" class="tp-category-error">
      <p>Unable to load categories. Please try again.</p>
    </div>

    <!-- Categories List -->
    <ul *ngIf="!isLoadingCategories && !hasError && categoryItems.length > 0">
      <ng-container *ngFor="let item of categoryItems; let i = index; trackBy: trackByCategory">
        <li class="has-dropdown">
          <!-- Parent Category -->
          <a class="cursor-pointer" (click)="handleParentCategory(item.category.categoryName)">
            <span *ngIf="item.category.img">
              <img
                [src]="item.category.img"
                alt="{{item.category.categoryName}}"
                style="width: 50px; height: 50px; object-fit: contain"
              />
            </span>
            {{ item.category.categoryName }}
          </a>

          <!-- Subcategories -->
          <ul *ngIf="item.subcategories && item.subcategories.length > 0" class="tp-submenu">
            <li *ngFor="let subcategory of item.subcategories; let i = index; trackBy: trackBySubcategory">
              <a class="cursor-pointer" (click)="handleSubCategory(subcategory.subCategoryName)">
                {{ subcategory.subCategoryName }}
              </a>
            </li>
          </ul>

          <!-- Loading indicator for subcategories -->
          <div *ngIf="item.isLoading" class="tp-subcategory-loading">
            <p class="text-muted small">Loading subcategories...</p>
          </div>
        </li>
      </ng-container>
    </ul>

    <!-- Empty State -->
    <div *ngIf="!isLoadingCategories && !hasError && categoryItems.length === 0" class="tp-category-empty">
      <p>No categories available.</p>
    </div>
  </nav>
</div>
