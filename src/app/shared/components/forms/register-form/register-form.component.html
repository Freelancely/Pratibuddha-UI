<form [formGroup]="registerForm" (ngSubmit)="onSubmit()">
  <div class="tp-login-input-wrapper">
    <!-- First Name -->
    <div class="tp-login-input-box">
      <div class="tp-login-input">
        <input id="firstname" type="text" placeholder="Swagat" formControlName="firstname">
      </div>
      <div class="tp-login-input-title">
        <label for="firstname">First Name *</label>
      </div>
      <span *ngIf="firstname?.hasError('required') && (firstname?.touched || formSubmitted)" class="text-danger">
        First name is required
      </span>
    </div>

    <!-- Last Name -->
    <div class="tp-login-input-box">
      <div class="tp-login-input">
        <input id="lastname" type="text" placeholder="Gautam" formControlName="lastname">
      </div>
      <div class="tp-login-input-title">
        <label for="lastname">Last Name *</label>
      </div>
      <span *ngIf="lastname?.hasError('required') && (lastname?.touched || formSubmitted)" class="text-danger">
        Last name is required
      </span>
    </div>

    <!-- Address -->
    <div class="tp-login-input-box">
      <div class="tp-login-input">
        <input id="address" type="text" placeholder="Dhapasi" formControlName="address">
      </div>
      <div class="tp-login-input-title">
        <label for="address">Address *</label>
      </div>
      <span *ngIf="address?.hasError('required') && (address?.touched || formSubmitted)" class="text-danger">
        Address is required
      </span>
    </div>

    <!-- Email -->
    <div class="tp-login-input-box">
      <div class="tp-login-input">
        <input id="email" type="email" placeholder="swagatgautamm32@gmail.com" formControlName="email">
      </div>
      <div class="tp-login-input-title">
        <label for="email">Email *</label>
      </div>
      <span *ngIf="(email?.hasError('required') && email?.touched) || (email?.hasError('email') && email?.dirty) || (formSubmitted && !email?.value)" class="text-danger">
        Email is required and must be valid
      </span>
    </div>

    <!-- Phone Number -->
    <div class="tp-login-input-box">
      <div class="tp-login-input">
        <input id="phoneNumber" type="tel" placeholder="9840860618" formControlName="phoneNumber">
      </div>
      <div class="tp-login-input-title">
        <label for="phoneNumber">Phone Number *</label>
      </div>
      <span *ngIf="phoneNumber?.hasError('required') && (phoneNumber?.touched || formSubmitted)" class="text-danger">
        Phone number is required
      </span>
      <span *ngIf="phoneNumber?.hasError('pattern') && phoneNumber?.touched" class="text-danger">
        Phone number must be 10 digits
      </span>
    </div>

    <!-- Password -->
    <div class="tp-login-input-box">
      <div class="p-relative">
        <div class="tp-login-input">
          <input id="password" [type]="isShowPass ? 'text' : 'password'" placeholder="Min. 6 characters"
            formControlName="password">
        </div>
        <div class="tp-login-input-eye">
          <span (click)="handleShowPass()" *ngIf="isShowPass" class="open-eye">
            <!-- Your existing eye SVG -->
            <svg width="18" height="14" viewBox="0 0 18 14" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M1 6.77778C1 6.77778 3.90909 1 9 1C14.0909 1 17 6.77778 17 6.77778C17 6.77778 14.0909 12.5556 9 12.5556C3.90909 12.5556 1 6.77778 1 6.77778Z" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M9.00018 8.94466C10.2052 8.94466 11.182 7.97461 11.182 6.77799C11.182 5.58138 10.2052 4.61133 9.00018 4.61133C7.79519 4.61133 6.81836 5.58138 6.81836 6.77799C6.81836 7.97461 7.79519 8.94466 9.00018 8.94466Z" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </span>
          <span (click)="handleShowPass()" *ngIf="!isShowPass" class="open-close">
            <!-- Your existing closed eye SVG -->
          </span>
        </div>
        <div class="tp-login-input-title">
          <label for="password">Password *</label>
        </div>
      </div>
      <span *ngIf="(password?.hasError('required') && password?.touched) || (password?.errors?.['minlength'] && password?.dirty) || (formSubmitted && !password?.value)" class="text-danger">
        Password is required and must be 6+ characters
      </span>
    </div>

    <!-- Confirm Password -->
    <div class="tp-login-input-box">
      <div class="p-relative">
        <div class="tp-login-input">
          <input id="confirmPassword" [type]="isShowConfirmPass ? 'text' : 'password'" placeholder="Confirm password"
            formControlName="confirmPassword">
        </div>
        <div class="tp-login-input-eye">
          <span (click)="handleShowConfirmPass()" *ngIf="isShowConfirmPass" class="open-eye">
            <!-- Eye SVG -->
          </span>
          <span (click)="handleShowConfirmPass()" *ngIf="!isShowConfirmPass" class="open-close">
            <!-- Closed eye SVG -->
          </span>
        </div>
        <div class="tp-login-input-title">
          <label for="confirmPassword">Confirm Password *</label>
        </div>
      </div>
      <span *ngIf="confirmPassword?.hasError('required') && (confirmPassword?.touched || formSubmitted)" class="text-danger">
        Confirm password is required
      </span>
      <span *ngIf="registerForm?.hasError('mismatch') && (confirmPassword?.touched || formSubmitted)" class="text-danger">
        Passwords do not match
      </span>
    </div>
  </div>

  <div class="tp-login-suggetions d-sm-flex align-items-center justify-content-between mb-20">
    <div class="tp-login-remeber">
      <input id="remeber" type="checkbox" formControlName="terms">
      <label for="remeber">I accept the terms of the Service & <a href="#">Privacy Policy</a> *</label>
    </div>
  </div>

  <div class="tp-login-bottom">
    <button type="submit" class="tp-login-btn w-100" [disabled]="loading || registerForm.invalid">
      {{ loading ? 'Creating Account...' : 'Sign Up' }}
    </button>
  </div>
</form>
